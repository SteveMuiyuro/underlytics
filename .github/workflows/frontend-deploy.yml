name: Frontend Deploy

on:
  workflow_run:
    workflows:
      - Frontend CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: frontend-deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: true

jobs:
  preflight:
    name: Deployment Preflight
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}

    steps:
      - name: Check deployment prerequisites
        id: check
        env:
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
        run: |
          reasons=()

          [ "$WORKFLOW_CONCLUSION" = "success" ] || reasons+=("Frontend CI conclusion is '$WORKFLOW_CONCLUSION'")
          [ "$HEAD_BRANCH" = "main" ] || reasons+=("head branch is '$HEAD_BRANCH'")
          [ -n "$VERCEL_PROJECT_ID" ] || reasons+=("VERCEL_PROJECT_ID is missing")
          [ -n "$VERCEL_ORG_ID" ] || reasons+=("VERCEL_ORG_ID is missing")

          if [ "${#reasons[@]}" -eq 0 ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            status="ready"
            reason_text="none"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            status="blocked"
            reason_text="${reasons[*]}"
          fi

          {
            echo "## Frontend Deploy Preflight"
            echo ""
            echo "- Source workflow: \`Frontend CI\`"
            echo "- Frontend CI conclusion: \`${WORKFLOW_CONCLUSION}\`"
            echo "- Head branch: \`${HEAD_BRANCH}\`"
            echo "- Terraform deploy status: \`${status}\`"
            echo "- Blockers: \`${reason_text}\`"
            echo "- Terraform steps in this workflow: \`terraform init\`, \`terraform validate\`, \`terraform apply\` in \`infra/frontend\` before Vercel deploy"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Apply Frontend Terraform And Deploy
    if: needs.preflight.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    needs:
      - preflight
    env:
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TF_VAR_environment: production
      TF_VAR_vercel_project_name: ${{ vars.VERCEL_PROJECT_NAME || 'underlytics' }}
      TF_VAR_vercel_project_id: ${{ vars.VERCEL_PROJECT_ID }}
      TF_VAR_vercel_org_id: ${{ vars.VERCEL_ORG_ID }}
      TF_VAR_frontend_domain: ${{ vars.FRONTEND_DOMAIN || 'https://underlytics.vercel.app' }}
      TF_VAR_backend_api_base_url: ${{ vars.NEXT_PUBLIC_API_URL || vars.BACKEND_API_BASE_URL || '' }}
      TF_VAR_clerk_publishable_key_reference: ${{ vars.CLERK_PUBLISHABLE_KEY_REFERENCE || 'GitHub/Vercel environment variable' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize frontend Terraform
        working-directory: infra/frontend
        run: terraform init -input=false

      - name: Validate frontend Terraform
        working-directory: infra/frontend
        run: terraform validate

      - name: Apply frontend Terraform
        working-directory: infra/frontend
        run: terraform apply -auto-approve -input=false

      - name: Capture frontend Terraform outputs
        id: frontend_outputs
        working-directory: infra/frontend
        run: |
          echo "frontend_domain=$(terraform output -raw frontend_domain)" >> "$GITHUB_OUTPUT"
          echo "backend_api_base_url=$(terraform output -raw backend_api_base_url)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Pull Vercel environment
        working-directory: frontend
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build frontend for Vercel
        working-directory: frontend
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy frontend to Vercel
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Publish deployment summary
        run: |
          {
            echo "## Frontend Deployment"
            echo ""
            echo "- Frontend domain: \`${{ steps.frontend_outputs.outputs.frontend_domain }}\`"
            echo "- Backend API base URL: \`${{ steps.frontend_outputs.outputs.backend_api_base_url }}\`"
            echo "- Vercel project ID: \`${VERCEL_PROJECT_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"
