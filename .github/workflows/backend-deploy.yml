name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "infra/backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: true

jobs:
  preflight:
    name: Deployment Preflight
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}

    steps:
      - name: Check deployment prerequisites
        id: check
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          GCP_TERRAFORM_SERVICE_ACCOUNT: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}
        run: |
          missing=()

          [ -n "$GCP_PROJECT_ID" ] || missing+=("GCP_PROJECT_ID")
          [ -n "$GCP_REGION" ] || missing+=("GCP_REGION")
          [ -n "$GCP_WIF_PROVIDER" ] || missing+=("GCP_WIF_PROVIDER")
          [ -n "$GCP_TERRAFORM_SERVICE_ACCOUNT" ] || missing+=("GCP_TERRAFORM_SERVICE_ACCOUNT")

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            status="ready"
            missing_text="none"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            status="blocked"
            missing_text="${missing[*]}"
          fi

          {
            echo "## Backend Deploy Preflight"
            echo ""
            echo "- Trigger ref: \`${GITHUB_REF}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Terraform deploy status: \`${status}\`"
            echo "- Missing required repository variables: \`${missing_text}\`"
            echo "- Terraform steps in this workflow: \`terraform init\`, targeted bootstrap \`terraform apply\`, full \`terraform apply\`"
          } >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: Verify Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync backend dependencies
        run: uv sync --dev --locked

      - name: Lint backend
        run: uv run ruff check .

      - name: Validate backend imports
        run: uv run python -c "from underlytics_api.main import app; from underlytics_api.worker_app import app as worker_app; print(app.title); print(worker_app.title)"

      - name: Run backend tests
        run: uv run pytest

  deploy:
    name: Deploy Backend Infrastructure
    if: needs.preflight.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    needs:
      - preflight
      - verify
    defaults:
      run:
        working-directory: infra/backend
    env:
      IMAGE_TAG: ${{ github.sha }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
      TF_VAR_project_name: underlytics
      TF_VAR_region: ${{ vars.GCP_REGION }}
      TF_VAR_db_region: ${{ vars.GCP_DB_REGION || vars.GCP_REGION }}
      TF_VAR_github_repository: ${{ vars.GITHUB_REPOSITORY_SLUG || github.repository }}
      TF_VAR_image_tag: ${{ github.sha }}
      TF_VAR_cors_allowed_origins: ${{ vars.CORS_ALLOWED_ORIGINS || 'http://localhost:3000,http://127.0.0.1:3000,https://underlytics.vercel.app' }}
      TF_VAR_admin_bootstrap_secret: ${{ secrets.TF_VAR_ADMIN_BOOTSTRAP_SECRET }}
      TF_VAR_clerk_jwt_key: ${{ secrets.TF_VAR_CLERK_JWT_KEY }}
      TF_VAR_clerk_jwt_issuer: ${{ secrets.TF_VAR_CLERK_JWT_ISSUER }}
      TF_VAR_clerk_publishable_key: ${{ secrets.TF_VAR_CLERK_PUBLISHABLE_KEY }}
      TF_VAR_clerk_secret_key: ${{ secrets.TF_VAR_CLERK_SECRET_KEY }}
      TF_VAR_clerk_authorized_parties: ${{ secrets.TF_VAR_CLERK_AUTHORIZED_PARTIES }}
      TF_VAR_clerk_webhook_secret: ${{ secrets.TF_VAR_CLERK_WEBHOOK_SECRET }}
      TF_VAR_langfuse_public_key: ${{ secrets.TF_VAR_LANGFUSE_PUBLIC_KEY }}
      TF_VAR_langfuse_secret_key: ${{ secrets.TF_VAR_LANGFUSE_SECRET_KEY }}
      TF_VAR_langfuse_host: ${{ secrets.TF_VAR_LANGFUSE_HOST }}
      TF_VAR_openai_api_key: ${{ secrets.TF_VAR_OPENAI_API_KEY }}
      TF_VAR_resend_api_key: ${{ secrets.TF_VAR_RESEND_API_KEY }}
      TF_VAR_email_from: ${{ secrets.TF_VAR_EMAIL_FROM }}
      TF_VAR_vertex_location: ${{ vars.VERTEX_LOCATION || vars.GCP_REGION }}
      TF_VAR_vertex_model: ${{ vars.VERTEX_MODEL || 'gemini-2.5-pro' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        run: terraform init -input=false

      - name: Validate Terraform
        run: terraform validate

      - name: Bootstrap APIs and Artifact Registry
        run: terraform apply -auto-approve -input=false -target=google_project_service.enabled -target=google_artifact_registry_repository.backend

      - name: Configure Artifact Registry auth
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build backend image
        run: docker build -t "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/underlytics-images/underlytics-api:${IMAGE_TAG}" ../../backend

      - name: Push backend image
        run: docker push "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/underlytics-images/underlytics-api:${IMAGE_TAG}"

      - name: Apply backend infrastructure
        run: terraform apply -auto-approve -input=false

      - name: Capture deployment outputs
        id: outputs
        run: |
          echo "api_gateway_url=$(terraform output -raw api_gateway_url)" >> "$GITHUB_OUTPUT"
          echo "backend_cloud_run_url=$(terraform output -raw backend_cloud_run_url)" >> "$GITHUB_OUTPUT"
          echo "worker_cloud_run_url=$(terraform output -raw worker_cloud_run_url)" >> "$GITHUB_OUTPUT"

      - name: Verify public backend
        run: |
          curl -fsS "${{ steps.outputs.api_gateway_url }}/" > /tmp/api-gateway-root.json
          curl -fsS "${{ steps.outputs.backend_cloud_run_url }}/" > /tmp/backend-root.json

      - name: Publish deployment summary
        run: |
          {
            echo "## Backend Deployment"
            echo ""
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- API Gateway URL: \`${{ steps.outputs.api_gateway_url }}\`"
            echo "- Backend Cloud Run URL: \`${{ steps.outputs.backend_cloud_run_url }}\`"
            echo "- Worker Cloud Run URL: \`${{ steps.outputs.worker_cloud_run_url }}\`"
            echo "- NEXT_PUBLIC_API_URL: \`${{ steps.outputs.api_gateway_url }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
