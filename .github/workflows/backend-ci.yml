name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync backend dependencies
        run: uv sync --dev --locked

      - name: Lint backend
        run: uv run ruff check .

      - name: Validate backend imports
        run: uv run python -c "from underlytics_api.main import app; from underlytics_api.worker_app import app as worker_app; print(app.title); print(worker_app.title)"

      - name: Run backend tests
        run: uv run pytest
